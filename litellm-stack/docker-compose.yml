# LiteLLM hub — runs as its own stack (LiteLLM + Postgres) on port 4000,#
#   cp .env.example .env   # set LITELLM_MASTER_KEY + ANTHROPIC_API_KEY
#   docker compose up -d

services:
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    volumes:
      - ./config.yaml:/app/config.yaml
    command:
      - "--config=/app/config.yaml"
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: "postgresql://llmproxy:dbpassword9090@db:5432/litellm"
      STORE_MODEL_IN_DB: "True"   # allows adding models via the LiteLLM UI
    env_file:
      - .env   # supplies LITELLM_MASTER_KEY + ANTHROPIC_API_KEY (see .env.example)
    depends_on:
      - db
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:16
    restart: always
    container_name: litellm_db
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: llmproxy
      # Local-dev default (the value from LiteLLM's own example). Used only
      # inside the compose network — change this AND the matching DATABASE_URL
      # above for anything beyond local development.
      POSTGRES_PASSWORD: dbpassword9090
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d litellm -U llmproxy"]
      interval: 1s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
    name: litellm_postgres_data
